<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="core" cx="0.42" cy="0.38" r="0.55">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="35%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#06070c"/>
  <!-- Soft aura (no filter, no clipping) -->
  <circle cx="16" cy="16" r="13" fill="url(#aura)"/>
  <!-- Organoid sphere -->
  <circle cx="16" cy="16" r="8" fill="url(#core)"/>
  <!-- Surface highlight -->
  <ellipse cx="13.5" cy="13" rx="2.8" ry="1.6" fill="white" opacity="0.15" transform="rotate(-15 13.5 13)"/>
  <!-- Cell clusters -->
  <circle cx="13" cy="14.5" r="2.5" fill="white" opacity="0.05"/>
  <circle cx="18.5" cy="14.5" r="2" fill="white" opacity="0.04"/>
  <circle cx="15.5" cy="19" r="2" fill="white" opacity="0.03"/>
  <!-- Sparks -->
  <circle cx="16" cy="6.5" r="0.6" fill="#67e8f9" opacity="0.7"/>
  <circle cx="7.5" cy="12" r="0.55" fill="#67e8f9" opacity="0.6"/>
  <circle cx="24.5" cy="12" r="0.55" fill="#a78bfa" opacity="0.6"/>
  <circle cx="8" cy="21.5" r="0.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="24" cy="21.5" r="0.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="16" cy="25.5" r="0.5" fill="#c084fc" opacity="0.5"/>
</svg>
