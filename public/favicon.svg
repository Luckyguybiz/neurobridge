<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="core" cx="0.42" cy="0.38" r="0.58">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Organoid sphere -->
  <circle cx="16" cy="16" r="8" fill="url(#core)" filter="url(#glow)"/>
  <!-- Highlight reflection -->
  <ellipse cx="13.5" cy="13" rx="2.5" ry="1.5" fill="white" opacity="0.18" transform="rotate(-20 13.5 13)"/>
  <!-- Cell cluster texture -->
  <circle cx="13" cy="14" r="2.5" fill="white" opacity="0.06"/>
  <circle cx="18.5" cy="15" r="2" fill="white" opacity="0.04"/>
  <circle cx="15" cy="19" r="2" fill="white" opacity="0.04"/>
  <!-- Synaptic sparks — symmetrical -->
  <circle cx="16" cy="6.5" r="0.6" fill="#67e8f9" opacity="0.7"/>
  <circle cx="7" cy="12" r="0.6" fill="#67e8f9" opacity="0.6"/>
  <circle cx="25" cy="12" r="0.6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="8" cy="22" r="0.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="24" cy="22" r="0.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="16" cy="25.5" r="0.5" fill="#c084fc" opacity="0.5"/>
</svg>
