<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#0f0c1d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.75" r="0.4">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Neural network dots -->
  <g opacity="0.35" filter="url(#blur)">
    <circle cx="150" cy="120" r="3" fill="#22d3ee"/>
    <circle cx="280" cy="180" r="2" fill="#a78bfa"/>
    <circle cx="420" cy="95" r="3" fill="#22d3ee"/>
    <circle cx="550" cy="160" r="2" fill="#a78bfa"/>
    <circle cx="900" cy="130" r="2" fill="#22d3ee"/>
    <circle cx="1050" cy="200" r="3" fill="#a78bfa"/>
    <circle cx="120" cy="480" r="2" fill="#22d3ee"/>
    <circle cx="300" cy="540" r="3" fill="#a78bfa"/>
    <circle cx="500" cy="500" r="2" fill="#22d3ee"/>
    <circle cx="780" cy="540" r="2" fill="#a78bfa"/>
    <circle cx="1050" cy="520" r="3" fill="#22d3ee"/>
  </g>

  <!-- Badge -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="360" height="44" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="22" cy="22" r="5" fill="#4ade80"/>
    <text x="42" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="2">OPEN-SOURCE · MIT · PEER-REVIEWED</text>
  </g>

  <!-- Main title -->
  <text x="80" y="260" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">The platform for</text>
  <text x="80" y="350" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-size="88" font-weight="400" fill="url(#accent)" letter-spacing="-2">brain organoid analysis</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.6)">9 peer-reviewed methods · 12,000 lines · Tested on 2.6M spikes</text>

  <!-- Stats row -->
  <g transform="translate(80, 490)" font-family="system-ui, sans-serif">
    <g transform="translate(0, 0)">
      <text x="0" y="30" font-size="42" font-weight="700" fill="#22d3ee">9</text>
      <text x="0" y="60" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1">PEER-REVIEWED METHODS</text>
    </g>
    <g transform="translate(320, 0)">
      <text x="0" y="30" font-size="42" font-weight="700" fill="#a78bfa">12K</text>
      <text x="0" y="60" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1">LINES OF ANALYSIS</text>
    </g>
    <g transform="translate(640, 0)">
      <text x="0" y="30" font-size="42" font-weight="700" fill="#22d3ee">2.6M</text>
      <text x="0" y="60" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1">SPIKES VALIDATED</text>
    </g>
    <g transform="translate(900, 0)">
      <text x="0" y="30" font-size="42" font-weight="700" fill="#a78bfa">22</text>
      <text x="0" y="60" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1">REFERENCES</text>
    </g>
  </g>

  <!-- Logo bottom right -->
  <text x="1120" y="600" text-anchor="end" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.8)">neuro<tspan fill="url(#accent)">computers</tspan></text>
</svg>
